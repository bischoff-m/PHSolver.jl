# yaml-language-server: $schema=../../schemas/system.schema.json

# omega0 = 1.0 (mass)
# g = 9.81 (gravity)
# l = 1.0 (length of the pendulum)

id: DGU_example
systems:
  # Combined system representing the full DC power network
  # In this example, we define it as a single system
  # (Could be split into multiple interconnected subsystems)
  # R_i = 0.1
  # L_i = 0.018
  # C_i = 0.000025
  - id: dgu
    systems:
      - id: Id
        dissipation: 0.1
        mass: 55.5555555556
        x0: 161.07
      - id: Iq
        dissipation: 0.1
        mass: 55.5555555556
        x0: 161.07
      - id: Vd
        dissipation: 0
        mass: 40000
        x0: 20000
      - id: Vq
        dissipation: 0
        mass: 40000
        x0: 20000
    connections:
      - from: Id
        to: Iq
        weight: 5.6548
      - from: Id
        to: Vd
        weight: -1
      - from: Iq
        to: Vq
        weight: -1
      - from: Vd
        to: Vq
        weight: 0.00785398163

      # PI Controller subsystem
  - id: controller_d
    systems:
      - id: integral
        dissipation: 0 # Check this value
        mass: 0.0666667
        x0: 0
      - id: proportional
        dissipation: 1 # Check this value
        mass: 0.1
        x0: 0
    connections:
      - from: integral
        to: proportional
        weight: 1

  - id: controller_q
    systems:
      - id: integral
        dissipation: 0 # Check this value
        mass: 0.0666667
        x0: 0
      - id: proportional
        dissipation: 1 # Check this value
        mass: 0.1
        x0: 0
    connections:
      - from: integral
        to: proportional
        weight: 1

  - id: Line
    systems:
      - id: Id
        dissipation: 0.343
        mass: 1142.85714286
        x0: 161.07
      - id: Iq
        dissipation: 0.343
        mass: 1142.85714286
        x0: 161.07
    connections:
      - from: Id
        to: Iq
        weight: 0.274889357

  - id: Load
    systems:
      - id: Id
        dissipation: 2.9154
        mass: 1.1428
        x0: 161.07
      - id: Iq
        dissipation: 2.9154
        mass: 1.1428
        x0: 161.07
    connections:
      - from: Id
        to: Iq
        weight: 274.8893

connections:
  - from: dgu.Id
    to: controller_d.proportional
    weight: -1
  - from: dgu.Iq
    to: controller_q.proportional
    weight: -1
  - from: dgu.Vd
    to: Line.Id
    weight: -1
  - from: dgu.Vq
    to: Line.Iq
    weight: -1
  - from: Line.Id
    to: Load.Id
    weight: 1
  - from: Line.Iq
    to: Load.Iq
    weight: 1
