# yaml-language-server: $schema=../../schemas/network.schema.json

# m = 1.0 (mass)
# g = 9.81 (gravity)
# l = 1.0 (length of the pendulum)

network:
  name: "Pendulum with PI Controller"

  systems:
    - id: "pendulum"
      matrices:
        J:
          - [0.0, 1.0]
          - [-1.0, 0.0]

        R:
          - [0.0, 0.0] # No damping
          - [0.0, 0.0]

        Q:
          - [9.81, 0.0] # m = 1, g = 9.81, l = 1
          - [0.0, 1.0]

        B:
          - [0.0]
          - [1.0]

      initial_state: [0.1745, 0.0] # Initial angle (rad) and angular momentum

    # PI Controller subsystem
    - id: "controller"
      matrices:
        J:
          - [0.0, 1.0]
          - [-1.0, 0.0]

        R:
          - [0.0, 0.0]
          - [0.0, 20.0] # Proportional gain (Kp)

        Q:
          - [8.0, 0.0] # Integral gain (kI)
          - [0.0, 0.1] # Derivative gain (1/kD)

        B:
          - [0.0]
          - [1.0]

      initial_state: [0.0, 0.0] # Controller starts with zero integral and proportional states

  connections:
    - from:
        system: "pendulum"
      to:
        system: "controller"
      type: "negative_feedback"
    - from:
        system: "controller"
      to:
        system: "pendulum"
      type: "direct"

simulation:
  time_span: [0.0, 50.0]
  timestep: 0.1
  solver: "IDA"
