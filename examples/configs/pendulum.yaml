# yaml-language-server: $schema=../../schemas/network.schema.json

# m = 1.0 (mass)
# g = 9.81 (gravity)
# l = 1.0 (length of the pendulum)

network:
  name: "Pendulum with PI Controller"

  systems:
    - id: "pendulum"
      components:
        - id: angle
          dissipation: 0
          mass: 9.81
          x0: 0.1745
        - id: momentum
          dissipation: 0
          mass: 1
          x0: 0
      connections:
        - from: angle
          to: momentum
          weight: 1
      ports:
        p1: momentum

    # PI Controller subsystem
    - id: "controller"
      components:
        - id: integral
          dissipation: 0
          mass: 8
          x0: 0
        - id: proportional
          dissipation: 20
          mass: 0.1
          x0: 0
      connections:
        - from: integral
          to: proportional
          weight: 1
      ports:
        p1: proportional

  connections:
    - from:
        system: pendulum
        port: p1
      to:
        system: controller
        port: p1
      weight: -1
    - from:
        system: controller
        port: p1
      to:
        system: pendulum
        port: p1
      weight: 1

simulation:
  time_span: [0, 50]
  timestep: 0.1
  solver: "IDA"
