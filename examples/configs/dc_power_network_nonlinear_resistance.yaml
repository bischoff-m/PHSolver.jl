# yaml-language-server: $schema=../../schemas/system.schema.json

# DC Power Network Example
# From: Structure-preserving discretization for port-Hamiltonian descriptor systems
# Section 4.1: A basic DC power network example
#
# This network models a DC power system with:
# - Generator (voltage source with internal resistance)
# - Transmission line (inductor with resistance)
# - Two capacitive loads
#
# State variables: [IL, V1, V2, IG, IR]
# - IL: Current through inductor (differential)
# - V1: Voltage at capacitor 1 (differential)
# - V2: Voltage at capacitor 2 (differential)
# - IG: Current through generator (algebraic)
# - IR: Current through load resistor (algebraic)

id: dc_network
# Combined system representing the full DC power network
# In this example, we define it as a single system
# (Could be split into multiple interconnected subsystems)
definitions:
  - power = 10
  - L = 2
  - C_1 = 0.01
  - C_2 = 0.02
  - R_L = 0.1
  - R_G = 6
  - R_R = 3
  - scale(P) = sqrt(P / R_R)
  - step_func(x, step_at, from, to, gain) = (to - from) / 2 * (1 + tanh(gain * (x - step_at))) + from
systems:
  - id: IL
    dissipation: R_L
    mass: L
    x0: scale(power)
  - id: V1
    dissipation: 0
    mass: C_1
    x0: (-R_R - R_L) * scale(power)
  - id: V2
    dissipation: 0
    mass: C_2
    x0: -R_R * scale(power)
  - id: IG
    dissipation: R_G
    mass: 0
    x0: 0
  - id: IR
    dissipation: R_R * step_func(t, 0.3, 1, 4, 100)
    mass: 0
    x0: 0
connections:
  - from: V1
    to: IL
  - from: IL
    to: V2
  - from: IG
    to: V1
  - from: IR
    to: V2
