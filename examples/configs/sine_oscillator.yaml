# yaml-language-server: $schema=../../schemas/network.schema.json

# Minimal undamped harmonic oscillator (2D port-Hamiltonian system)
#
# Dynamics (with Q = I, R = 0):
#   xdot = J x
#   J = [ 0  1;
#        -1  0]
#
# With initial_state = [x1(0), x2(0)] = [0, 1], the solution is:
#   x1(t) = sin(t)
#   x2(t) = cos(t)

network:
  name: "Pure Sine Wave"

  systems:
    - id: "oscillator"
      components:
        - id: x1
          dissipation: 0
          mass: 1
          x0: 0
        - id: x2
          dissipation: 0
          mass: 1
          x0: 1
      connections:
        - from: x1
          to: x2
          weight: 1

simulation:
  time_span: [0, 10]
  solver: "IDA"
