# yaml-language-server: $schema=../../schemas/network.schema.json

# Simple Interconnected Mass-Spring-Damper System
# Two masses connected by a spring with damping
#
# System 1: Mass m1 with spring and damper
# System 2: Mass m2 with damper
# Connected through a spring coupling

network:
  name: "Coupled Mass-Spring-Damper"
  systems:
    # First mass-spring-damper subsystem
    - id: mass1
      components:
        - id: momentum
          dissipation: 0.5
          mass: 1
          x0: 0.5
        - id: position
          dissipation: 0
          mass: 2
          x0: 1
      connections:
        - from: momentum
          to: position
          weight: 1
      ports:
        p1: momentum

    # Second mass-damper subsystem
    - id: mass2
      components:
        - id: momentum
          dissipation: 0.3
          mass: 1.5
          x0: -0.3
        - id: position
          dissipation: 0
          mass: 1
          x0: -0.5
      connections:
        - from: momentum
          to: position
          weight: 1
      ports:
        p1: momentum

  # Interconnect the two masses through their outputs (velocities)
  connections:
    - from:
        system: mass1
        port: p1
      to:
        system: mass2
        port: p1
      weight: -1

    - from:
        system: mass2
        port: p1
      to:
        system: mass1
        port: p1
      weight: -1

  ports:
    port1:
      system: mass1
      port: p1
    port2:
      system: mass2
      port: p1

simulation:
  time_span: [0, 10]
  solver: IDA
