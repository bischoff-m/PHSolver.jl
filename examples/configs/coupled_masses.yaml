# yaml-language-server: $schema=../../schemas/network.schema.json

# Simple Interconnected Mass-Spring-Damper System
# Two masses connected by a spring with damping
#
# System 1: Mass m1 with spring and damper
# System 2: Mass m2 with damper
# Connected through a spring coupling

network:
  name: "Coupled Mass-Spring-Damper"

  systems:
    # First mass-spring-damper subsystem
    - id: "mass1"
      matrices:
        # State: [p1, q1] (momentum, position)
        # J matrix (skew-symmetric)
        J:
          - [0.0, 1.0]
          - [-1.0, 0.0]

        # R matrix (damping)
        R:
          - [0.5, 0.0] # Damping coefficient
          - [0.0, 0.0]

        # Q matrix (mass and spring)
        Q:
          - [1.0, 0.0] # Mass m1 = 1.0
          - [0.0, 2.0] # Spring k1 = 2.0

        # B matrix (input on momentum)
        B:
          - [1.0]
          - [0.0]

      initial_state: [0.5, 1.0] # Initial momentum and position

    # Second mass-damper subsystem
    - id: "mass2"
      matrices:
        # State: [p2, q2] (momentum, position)
        J:
          - [0.0, 1.0]
          - [-1.0, 0.0]

        R:
          - [0.3, 0.0] # Damping coefficient
          - [0.0, 0.0]

        Q:
          - [1.5, 0.0] # Mass m2 = 1.5
          - [0.0, 1.0] # Spring k2 = 1.0

        B:
          - [1.0]
          - [0.0]

      initial_state: [-0.3, -0.5] # Initial momentum and position

  # Interconnect the two masses through their outputs (velocities)
  connections:
    - from: "mass1"
      from_ports: [1]
      to: "mass2"
      to_ports: [1]
      type: "negative_feedback" # Standard feedback coupling

    - from: "mass2"
      from_ports: [1]
      to: "mass1"
      to_ports: [1]
      type: "negative_feedback"

simulation:
  time_span: [0.0, 10.0]
  solver: "IDA"
